<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<style>
body{
background-image:url(https://tse2.mm.bing.net/th/id/OIP.JZdCKn9KZctpHXLuallMAwHaFj?rs=1&pid=ImgDetMain&o=7&rm=3);
background-reapeat:no-repeat;
background-size:cover;
}
</style>
</head>
<body>
<h1 class="text-center text-white">The Great Toy(Lego) Hunt</h1>
<div class="container">

<div class="row my-5 justify-content-center g-5">
<!-- first div -->
<div class="col-md-4">
<div class="gate-card text-white">
<h3>Guess the Chest Number</h3>
<input type="number" id="input1" placeholder="Enter Key Number" class="form-control mb-3" style="border:2px solid black; box-shadow:2px 2px 10px lightblue;">
<button type="button" class="btn btn-primary" style="border:2px solid black; box-shadow:2px 2px 10px lightblue;" onclick="checkKey(1)">Check Key</button>
<p style="color:white;" id="result1" class="result"></p>
</div>
</div>
<!-- second div -->
<div class="col-md-4">
<div class="gate-card text-white">
<h3>Guess the Chest Number</h3>
<input type="number" id="input2" placeholder="Enter Key Number" class="form-control mb-3" style="border:2px solid black; box-shadow:2px 2px 10px lightblue;">
<button type="button" class="btn btn-primary" style="border:2px solid black; box-shadow:2px 2px 10px lightblue;" onclick="checkKey(2)">Check Key</button>
<p style="color:white;" id="result2" class="result"></p>
</div>
</div>
<!-- third div -->
<div class="col-md-4">
<div class="gate-card text-white">
<h3>Guess the Chest Number</h3>
<input type="number" id="input3" placeholder="Enter Key Number" class="form-control mb-3" style="border:2px solid black; box-shadow:2px 2px 10px lightblue;">
<button type="button" class="btn btn-primary" style="border:2px solid black; box-shadow:2px 2px 10px lightblue;" onclick="checkKey(3)">Check Key</button>
<p id="result3" class="result"></p>
</div>
</div>

</div>

</div>
<script>
function checkKey(gateNumber){
let input = document.getElementById("input" + gateNumber).value;
let result = document.getElementById("result" + gateNumber);
if(parseInt(input) === gateNumber){
result.innerHTML = "Success, You Have Got Some Lego";
result.style.color = "lightgreen";
}
else{
result.innerHTML = "Oops, The key doesn't fit this gate";
result.style.color = "red";
}
}
</script>
</body>
</html>
